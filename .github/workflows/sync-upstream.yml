name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: write
  actions: read

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Calculate upstream update frequency
        id: cadence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WORKFLOW_FILE: sync-upstream.yml
          UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO || 'volcengine/MineContext' }}
          UPSTREAM_BRANCH: ${{ vars.UPSTREAM_BRANCH || '' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import json
          import math
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone

          MIN_INTERVAL_DAYS = 1
          MAX_INTERVAL_DAYS = 7
          NO_PREVIOUS_SYNC_DAYS = float("inf")

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          default_branch = os.environ["DEFAULT_BRANCH"]
          workflow_file = os.environ["WORKFLOW_FILE"]
          upstream_repo = os.environ["UPSTREAM_REPO"]
          upstream_branch = os.environ.get("UPSTREAM_BRANCH") or default_branch
          event_name = os.environ["EVENT_NAME"]

          def gh_get(url: str):
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  raise RuntimeError(f"GitHub API HTTP error ({e.code}) for URL: {url}") from e
              except urllib.error.URLError as e:
                  raise RuntimeError(f"GitHub API network error for URL: {url}: {e.reason}") from e

          def parse_time(ts: str) -> datetime:
              return datetime.strptime(ts, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=timezone.utc)

          commits_url = (
              f"https://api.github.com/repos/{upstream_repo}/commits?"
              f"sha={urllib.parse.quote(upstream_branch)}&per_page=30"
          )
          commits = gh_get(commits_url)
          commit_times = [parse_time(c["commit"]["committer"]["date"]) for c in commits]

          if len(commit_times) < 2:
              interval_days = MAX_INTERVAL_DAYS
          else:
              deltas = []
              for i in range(len(commit_times) - 1):
                  delta_days = (commit_times[i] - commit_times[i + 1]).total_seconds() / 86400
                  if delta_days > 0:
                      deltas.append(delta_days)
              avg_days = sum(deltas) / len(deltas) if deltas else MAX_INTERVAL_DAYS
              interval_days = max(MIN_INTERVAL_DAYS, min(MAX_INTERVAL_DAYS, math.ceil(avg_days)))

          runs_url = (
              f"https://api.github.com/repos/{repo}/actions/workflows/{workflow_file}/runs?"
              "event=schedule&status=success&per_page=1"
          )
          runs = gh_get(runs_url).get("workflow_runs", [])
          now = datetime.now(timezone.utc)
          if runs:
              last_sync_time = parse_time(runs[0]["created_at"])
              days_since_last = (now - last_sync_time).total_seconds() / 86400
          else:
              days_since_last = NO_PREVIOUS_SYNC_DAYS

          should_sync = event_name == "workflow_dispatch" or days_since_last >= interval_days

          print(f"upstream_repo={upstream_repo}")
          print(f"upstream_branch={upstream_branch}")
          print(f"interval_days={interval_days}")
          print(f"days_since_last={days_since_last:.2f}")
          print(f"should_sync={str(should_sync).lower()}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"upstream_repo={upstream_repo}\n")
              f.write(f"upstream_branch={upstream_branch}\n")
              f.write(f"default_branch={default_branch}\n")
              f.write(f"interval_days={interval_days}\n")
              f.write(f"days_since_last={days_since_last:.2f}\n")
              f.write(f"should_sync={'true' if should_sync else 'false'}\n")
          PY

      - name: Print decision
        run: |
          echo "upstream: ${{ steps.cadence.outputs.upstream_repo }}"
          echo "branch: ${{ steps.cadence.outputs.upstream_branch }}"
          echo "interval_days: ${{ steps.cadence.outputs.interval_days }}"
          echo "days_since_last: ${{ steps.cadence.outputs.days_since_last }}"
          echo "should_sync: ${{ steps.cadence.outputs.should_sync }}"

      - name: Sync from upstream
        if: steps.cadence.outputs.should_sync == 'true'
        env:
          DEFAULT_BRANCH: ${{ steps.cadence.outputs.default_branch }}
          UPSTREAM_REPO: ${{ steps.cadence.outputs.upstream_repo }}
          UPSTREAM_BRANCH: ${{ steps.cadence.outputs.upstream_branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout "${DEFAULT_BRANCH}"
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" || git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"

          if git merge-base --is-ancestor "upstream/${UPSTREAM_BRANCH}" HEAD; then
            echo "Current branch already contains upstream changes."
            exit 0
          fi

          git merge --no-edit "upstream/${UPSTREAM_BRANCH}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Skip sync
        if: steps.cadence.outputs.should_sync != 'true'
        run: echo "Skip sync this run; waiting for next interval window."
